apiVersion: batch/v1
kind: Job
metadata:
  name: crew-demo-migrate-app
spec:
  backoffLimit: 12
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crew-demo-migrate-app
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate-app
          image: ghcr.io/adiom-data/crew-demo-app-migrate:latest
          env:
            - name: DB_HOST
              value: crew-demo-postgres-rw
            - name: DB_NAME
              value: app
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: crew-demo-postgres-app
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crew-demo-postgres-app
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
