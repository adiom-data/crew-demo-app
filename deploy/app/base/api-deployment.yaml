apiVersion: apps/v1
kind: Deployment
metadata:
  name: crew-demo-api
spec:
  replicas: 1
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crew-demo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crew-demo-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/adiom-data/crew-demo-app-api:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: AUTH_ISSUER
              value: http://crew-demo-api/auth
            - name: PROXY_REDIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: PROXY_REDIRECT_URL
                  optional: true
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_ALLOWED_AUDIENCES
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: OIDC_ALLOWED_AUDIENCES
                  optional: true
            - name: AUTH_PRIVATE_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: AUTH_PRIVATE_KEY_BASE64
            - name: AUTH_STATE_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: crew-demo-auth
                  key: AUTH_STATE_KEY_BASE64
            - name: PGHOST
              value: crew-demo-postgres-rw
            - name: PGDATABASE
              value: app
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: crew-demo-postgres-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: crew-demo-postgres-app
                  key: password
            # Stripe billing. All optional: the API boots and serves everything
            # else when the crew-demo-stripe secret is absent (previews), and
            # billing reports Unavailable.
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: crew-demo-stripe
                  key: STRIPE_SECRET_KEY
                  optional: true
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: crew-demo-stripe
                  key: STRIPE_WEBHOOK_SECRET
                  optional: true
            - name: STRIPE_PRICE_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: crew-demo-stripe
                  key: STRIPE_PRICE_MONTHLY
                  optional: true
            - name: STRIPE_PRICE_ANNUAL
              valueFrom:
                secretKeyRef:
                  name: crew-demo-stripe
                  key: STRIPE_PRICE_ANNUAL
                  optional: true
            - name: OTEL_SERVICE_NAME
              value: crew-demo-api
          readinessProbe:
            grpc:
              port: 8080
              service: readiness
          livenessProbe:
            grpc:
              port: 8080
              service: liveness
          startupProbe:
            grpc:
              port: 8080
              service: liveness
            failureThreshold: 30
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
